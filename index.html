<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MaCourse</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Pacifico&family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #4a4a6a;
    --jaune: #FFD93D;
    --blanc: #FFFFFF;
    --gris-clair: #F5F5F5;
    --gris: #888;
    --ombre: 0 4px 20px rgba(0,0,0,0.10);
    --ombre-forte: 0 8px 32px rgba(0,0,0,0.16);
    --radius: 22px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100vw;
    overflow-x: hidden;
  }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100dvh;
    background: linear-gradient(160deg, #e0f7fa 0%, #b2ebf2 40%, #c8e6c9 100%);
    padding: 0;
    touch-action: pan-y;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* TOPBAR */
  .topbar {
    background: white;
    padding: 14px 20px 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar-titre {
    font-family: 'Oswald', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #2d2d44;
  }

  /* TAB BAR */
  .tabbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 520px;
    background: white;
    display: flex;
    border-top: 1px solid #eee;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 8px;
    border: none;
    background: transparent;
    cursor: pointer;
    gap: 3px;
    color: #aaa;
    transition: color 0.2s;
  }
  .tab.active { color: #2d2d44; }
  .tab-icon { font-size: 1.4rem; }
  .tab-label { font-size: 0.7rem; font-weight: 800; font-family: 'Nunito', sans-serif; letter-spacing: 0.5px; }

  /* PAGES */
  .page { padding-bottom: 80px; }

  /* WRAPPER GLOBAL */
  .app-wrap {
    width: 100%;
    max-width: 520px;
    padding: 0;
  }

  /* GRILLE */
  .grille {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    padding: 12px 14px;
  }

  /* CARTE */
  .carte {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--ombre);
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
    user-select: none;
  }
  .carte:active { transform: scale(0.96); }
  .carte.ouverte { grid-column: 1 / -1; cursor: default; }

  .carte-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 26px 16px 22px;
    min-height: 120px;
  }

  .carte-logo {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.7rem;
    font-weight: 900;
    flex-shrink: 0;
    overflow: hidden;
  }
  .carte-logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
  }

  .carte-nom {
    font-size: 0.88rem;
    font-weight: 800;
    color: #333;
    text-align: center;
    line-height: 1.2;
  }

  /* Badge compteur */
  .badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--rose);
    color: white;
    font-size: 0.7rem;
    font-weight: 900;
    border-radius: 50px;
    padding: 2px 8px;
    min-width: 22px;
    text-align: center;
  }

  /* CARTE LISTE */
  .carte-liste { grid-column: 1 / -1; }
  .carte-liste .carte-header { background: #ffffff; min-height: 60px; padding: 10px 16px; flex-direction: row; justify-content: center; gap: 12px; }
  .carte-liste .carte-logo { background: linear-gradient(135deg, #FF6B9D, #FF9A6C); color: white; width: 38px !important; height: 38px !important; font-size: 1.1rem !important; border-radius: 10px !important; }

  .carte-liste.ouverte .carte-header { border-bottom: 1px solid #f0f0f0; }
  .corps-liste { padding: 0 16px 18px; display: none; }
  .carte.ouverte .corps-liste { display: block; }

  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .input-row input[type="text"] {
    flex: 1;
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: var(--rose); }
  .input-row select {
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 10px 10px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    outline: none;
    background: white;
    color: #444;
    transition: border-color 0.2s;
    max-width: 130px;
  }
  .input-row select:focus { border-color: var(--rose); }

  .btn {
    background: linear-gradient(135deg, #2d2d44, #3d3d5c);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .btn:active { opacity: 0.8; transform: scale(0.95); }

  .article-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 12px;
    margin-bottom: 6px;
    background: #fafafa;
    border: 1px solid #f0f0f0;
    transition: background 0.15s;
  }
  .article-item .puce {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .article-item .art-nom {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 700;
    color: #333;
  }
  .article-item .art-enseigne {
    font-size: 0.72rem;
    font-weight: 800;
    color: #888;
    background: #eee;
    padding: 2px 8px;
    border-radius: 50px;
  }
  .article-item .btn-suppr {
    background: none;
    border: none;
    color: #ccc;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .article-item .btn-suppr:hover { color: #FF6B9D; }

  .vide { color: #bbb; font-size: 0.85rem; text-align: center; padding: 12px 0; font-weight: 600; }

  /* CARTE "JE PARS" */
  .carte-pars .carte-header { background: linear-gradient(135deg, #f0fff4, #fff); }
  .carte-pars .carte-logo { background: linear-gradient(135deg, #43e97b, #38f9d7); color: white; font-size: 1.5rem; }

  /* CARTE ENSEIGNE */
  .carte-magasin .carte-logo { border: 2px solid #eee; }
  .carte-magasin {
    box-shadow:
      0 2px 0 rgba(255,255,255,0.4) inset,
      0 -3px 0 rgba(0,0,0,0.2) inset,
      0 8px 0 rgba(0,0,0,0.2),
      0 12px 24px rgba(0,0,0,0.25),
      0 2px 4px rgba(0,0,0,0.15);
    border-bottom: 5px solid rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.4);
    transform: translateY(0);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .carte-magasin:active {
    transform: translateY(5px);
    box-shadow:
      0 2px 0 rgba(255,255,255,0.3) inset,
      0 -1px 0 rgba(0,0,0,0.1) inset,
      0 2px 0 rgba(0,0,0,0.15),
      0 4px 8px rgba(0,0,0,0.15);
    border-bottom-width: 2px;
  }

  /* CARTE REGLAGES */
  .carte-reglages { grid-column: 1 / -1; }
  .carte-reglages .carte-header { background: #ffffff; min-height: 60px; padding: 10px 16px; flex-direction: row; justify-content: center; gap: 12px; }
  .carte-reglages .carte-logo { background: linear-gradient(135deg, #a18cd1, #fbc2eb); color: white; font-size: 1.1rem; width: 38px !important; height: 38px !important; border-radius: 10px !important; }


  .carte-reglages.ouverte .carte-header { border-bottom: 1px solid #f0f0f0; }
  .corps-reglages { padding: 0 16px 18px; display: none; }
  .carte-reglages.ouverte .corps-reglages { display: block; }

  .section-titre {
    font-size: 0.78rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #aaa;
    margin: 14px 0 10px;
  }

  .enseigne-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 14px;
    background: #fafafa;
    border: 1.5px solid #eee;
    margin-bottom: 8px;
  }
  .enseigne-mini-logo {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    font-weight: 900;
    flex-shrink: 0;
    overflow: hidden;
  }
  .enseigne-mini-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .enseigne-row .enseigne-nom { flex: 1; font-weight: 800; font-size: 0.9rem; color: #333; }
  .btn-small {
    border: none;
    border-radius: 9px;
    padding: 6px 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.78rem;
    cursor: pointer;
    transition: opacity 0.18s;
  }
  .btn-small:active { opacity: 0.7; }
  .btn-edit { background: #f0f0f0; color: #555; }
  .btn-suppr-e { background: #ffe5ee; color: var(--rose); }
  .btn-add-enseigne {
    width: 100%;
    padding: 12px;
    border-radius: 14px;
    border: 2px dashed #ddd;
    background: none;
    color: #aaa;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 4px;
  }
  .btn-add-enseigne:hover { border-color: var(--rose); color: var(--rose); }

  /* DRAG */
  .carte.dragging {
    opacity: 0.5;
    transform: scale(1.04);
    box-shadow: var(--ombre-forte);
    z-index: 100;
  }
  .carte.drag-over { outline: 3px dashed var(--rose); outline-offset: -3px; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }

  .modal {
    background: white;
    border-radius: 28px 28px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 520px;
    max-height: 85dvh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.visible .modal { transform: translateY(0); }
  #modal-courses .modal { height: 90dvh; min-height: 90dvh; display: flex; flex-direction: column; }
  #modal-courses #modal-courses-liste { flex: 1; overflow-y: auto; }
  #modal-courses #btn-effacer-coches { flex-shrink: 0; }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: #ddd;
    border-radius: 4px;
    margin: 0 auto 20px;
  }

  .modal-titre {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  #modal-courses-titre { margin-bottom: 0; }
  .modal-titre h2 {
    font-size: 1.3rem;
    font-weight: 900;
    color: #222;
  }

  .modal-logo {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 900;
    overflow: hidden;
    flex-shrink: 0;
  }
  .modal-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }

  .modal-article {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 10px;
    margin-bottom: 4px;
    background: #f9f9f9;
    cursor: pointer;
    transition: background 0.15s;
    border: 1.5px solid transparent;
  }
  .modal-article:active { background: #f0f0f0; }
  .modal-article.barre {
    background: #f9f9f9;
    border-color: transparent;
    opacity: 0.7;
  }
  .modal-article.barre .modal-art-nom {
    color: #999;
    font-style: italic;
    position: relative;
    display: inline;
    flex: 1;
    text-decoration: line-through;
    text-decoration-color: #333;
    text-decoration-thickness: 2px;
  }
  .modal-art-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2.5px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .modal-article.barre .modal-art-check {
    background: #43e97b;
    border-color: #43e97b;
    color: white;
    font-size: 0.8rem;
  }
  .modal-art-nom { font-weight: 700; font-size: 0.88rem; color: #333; flex: 1; }
  .btn-enseigne-suggeree {
    padding: 6px 12px;
    border-radius: 20px;
    border: none;
    font-size: 0.8rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    opacity: 1 !important;
  }
  .modal-art-drag {
    color: #ccc;
    font-size: 1.1rem;
    padding: 0 4px 0 10px;
    cursor: grab;
    touch-action: none;
    user-select: none;
    flex-shrink: 0;
  }
  .modal-article { display: flex; align-items: center; }
  .modal-article.dragging-art { opacity: 0.4; }
  .modal-article.drag-over-art { border-top: 2px solid #FF6B9D; }


  .modal-vide { color: #bbb; text-align: center; padding: 30px 0; font-weight: 600; }

  .btn-modal-fermer {
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    background: linear-gradient(135deg, #2d2d44, #3d3d5c);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
  }

  /* MODAL CHOIX ENSEIGNE (pour "je pars") */
  .enseigne-choix-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-bottom: 6px;
  }
  .enseigne-choix-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 10px;
    border-radius: 16px;
    border: 2px solid #eee;
    background: white;
    cursor: pointer;
    transition: border-color 0.18s, box-shadow 0.18s;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    color: #333;
  }
  .enseigne-choix-btn:active { border-color: var(--rose); box-shadow: 0 0 0 3px rgba(255,107,157,0.15); }

  /* MODALE ÉDITION ENSEIGNE */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.8rem; font-weight: 900; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--rose); }

  .color-picker-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-swatch {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-swatch.active { border-color: #333; transform: scale(1.15); }

  .logo-options {
    display: flex;
    gap: 10px;
  }
  .logo-opt {
    flex: 1;
    padding: 12px 8px;
    border-radius: 12px;
    border: 2px solid #eee;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.8rem;
    color: #555;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.18s;
  }
  .logo-opt.active { border-color: var(--rose); color: var(--rose); }

  .btn-valider {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #2d2d44, #3d3d5c);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 8px;
  }

  /* Chevron */
  .chevron {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 0.75rem;
    color: #ccc;
    transition: transform 0.25s;
  }
  .carte.ouverte .chevron { transform: rotate(180deg); }

  /* Ligne séparatrice */
  .sep {
    height: 1px;
    background: #eee;
    margin: 12px 0;
  }

  /* Input couleur custom */

  /* RECHERCHE LOGO */
  .logo-search-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
  }
  .btn-chercher-logo {
    flex: 1;
    padding: 10px 14px;
    border-radius: 12px;
    border: 2px solid #eee;
    background: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    color: #555;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-chercher-logo:hover { border-color: var(--rose); color: var(--rose); }
  .logo-apercu-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: 14px;
    background: #f9f9f9;
    border: 1.5px solid #eee;
    margin-top: 10px;
  }
  .logo-apercu-img {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    object-fit: contain;
    background: white;
    border: 1px solid #eee;
  }
  .logo-apercu-txt {
    font-size: 0.82rem;
    font-weight: 700;
    color: #555;
  }
  .logo-apercu-txt span { color: #aaa; font-weight: 600; font-size: 0.78rem; display: block; margin-top: 2px; }
  .btn-logo-suppr {
    margin-left: auto;
    background: #ffe5ee;
    color: var(--rose);
    border: none;
    border-radius: 9px;
    padding: 6px 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.78rem;
    cursor: pointer;
  }

  input[type="color"] {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 3px solid #eee;
    cursor: pointer;
    padding: 0;
    background: none;
  }
</style>
</head>
<body>

<div class="app-wrap">
  <!-- HEADER -->
  <div class="topbar" id="topbar">
    <span class="topbar-titre" id="topbar-titre">🛒 Courses</span>
  </div>

  <!-- PAGES -->
  <div class="page" id="page-courses">
    <div class="grille" id="grille"></div>
  </div>

  <div class="page" id="page-liste" style="display:none">
    <div id="vue-liste" style="padding:12px 14px"></div>
  </div>

  <div class="page" id="page-enseignes" style="display:none">
    <div id="vue-enseignes" style="padding:12px 14px"></div>
  </div>

  <!-- TAB BAR -->
  <nav class="tabbar">
    <button class="tab active" id="tab-courses" onclick="switchTab('courses')">
      <span class="tab-icon">🛒</span>
      <span class="tab-label">Courses</span>
    </button>
    <button class="tab" id="tab-liste" onclick="switchTab('liste')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">Ma liste</span>
    </button>
    <button class="tab" id="tab-enseignes" onclick="switchTab('enseignes')">
      <span class="tab-icon">🏪</span>
      <span class="tab-label">Enseignes</span>
    </button>
  </nav>
</div><!-- /app-wrap -->

<!-- MODAL JE PARS : choix enseigne -->
<div class="modal-overlay" id="modal-choix">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-titre">
      <span style="font-size:1.6rem">🏪</span>
      <h2>Dans quel magasin ?</h2>
    </div>
    <div class="enseigne-choix-grid" id="enseigne-choix-grid"></div>

];

const DEFAUT_ENSEIGNES = [

  { id: 'e2', nom: 'Boulangerie', lettre: 'B', couleur: '#fb923c', texteCouleur: '#ffffff', logoType: 'lettre', logoData: null },

];

  { id: 'a1', nom: 'Lait entier', enseigneId: 'e1' },
  { id: 'a2', nom: 'Pain de campagne', enseigneId: 'e2' },
  { id: 'a3', nom: 'Tomates cerises', enseigneId: 'e3' },
];

function charger(cle, defaut) {
  try {
    const val = localStorage.getItem(cle);
    return val ? JSON.parse(val) : defaut;
  } catch(e) { return defaut; }
}
function sauvegarder() {
  try {
    localStorage.setItem('mc_enseignes', JSON.stringify(enseignes));
    localStorage.setItem('mc_articles', JSON.stringify(articles));
    localStorage.setItem('mc_ordre', JSON.stringify(ordreMagasins));
    localStorage.setItem('mc_barre', JSON.stringify(barre));
  } catch(e) {}
}

// Migration propre : on nettoie les champs parasites au chargement
const raw_enseignes = charger('mc_enseignes', DEFAUT_ENSEIGNES);
let enseignes = raw_enseignes.map(e => ({
  id: e.id,
  nom: e.nom,
  couleur: e.couleur || '#888888',
  texteCouleur: e.texteCouleur || '#ffffff',
  fontSize: e.fontSize || 1.4,
  logoData: e.logoData || null,
  afficherNom: e.afficherNom || false,
  carteFidelite: e.carteFidelite || '',
  carteType: e.carteType || 'barcode'
}));
let articles = charger('mc_articles', DEFAUT_ARTICLES);
let ordreMagasins = charger('mc_ordre', enseignes.map(e => e.id));
let barre = charger('mc_barre', {});
// Sauvegarder la migration propre immédiatement
try { localStorage.setItem('mc_enseignes', JSON.stringify(enseignes)); } catch(e) {}

// Edit enseigne
let editEnseigneId = null;
let editCouleurSelectionnee = '#FF6B9D';
let editTexteCouleur = '#ffffff';
let editFontSize = 1.4;
let editLogoData = null;
let editAfficherNom = false;
let editCarteFidelite = '';
let editCarteType = 'barcode';
let editLogoOpt = 'lettre';
let editLogoBase64 = null;

// Cartes ouvertes
let carteOuverte = null; // 'liste' | 'reglages' | null

// ===================== RENDU =====================
function render() {
  renderCourses();
  renderListe();
  renderEnseignes();
}

function renderCourses() {
  const grille = document.getElementById('grille');
  if (!grille) return;
  grille.innerHTML = '';
  const ordreTrié = [...ordreMagasins].sort((a, b) => {
    const nbA = articles.filter(x => x.enseigneId === a).length;
    const nbB = articles.filter(x => x.enseigneId === b).length;
    return nbB - nbA;
  });
  ordreTrié.forEach((id, idx) => {
    const e = enseignes.find(x => x.id === id);
    const nb = articles.filter(a => a.enseigneId === id).length;
    if (e && nb > 0) grille.appendChild(creerCarteMagasin(e, idx));
  });
  initDrag();
}

function renderListe() {
  const vue = document.getElementById('vue-liste');
  if (!vue) return;
  vue.innerHTML = `
    <div id="liste-articles">${renderArticles()}</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:16px">
      <input type="text" id="input-article" placeholder="Ajouter un article…"

        style="width:100%;border:2px solid #eee;border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:0.92rem;outline:none;">
      <div style="display:flex;gap:8px">
        <select id="select-enseigne" style="flex:1;border:2px solid #eee;border-radius:12px;padding:10px;font-family:'Nunito',sans-serif;font-size:0.85rem;outline:none;background:white;color:#444">${optionsEnseignes()}</select>
        <button class="btn" onclick="ajouterArticle()" style="padding:10px 22px;font-size:1rem">Ajouter</button>
      </div>
    </div>`;
}

function renderEnseignes() {
  const vue = document.getElementById('vue-enseignes');
  if (!vue) return;
  vue.innerHTML = `
    <div class="section-titre">Mes enseignes</div>
    ${enseignes.map(e => creerEnseigneRowHTML(e)).join('')}
    <button class="btn-add-enseigne" onclick="ajouterEnseigne()" style="margin-top:12px">＋ Ajouter une enseigne</button>`;
}

let ongletActif = 'courses';
function switchTab(tab) {
  ongletActif = tab;
  ['courses','liste','enseignes'].forEach(t => {
    document.getElementById('page-' + t).style.display = t === tab ? 'block' : 'none';
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  const titres = { courses: '🛒 Courses', liste: '📋 Ma liste', enseignes: '🏪 Enseignes' };
  document.getElementById('topbar-titre').textContent = titres[tab];
  if (tab === 'liste') renderListe();
  if (tab === 'enseignes') renderEnseignes();
}

function logoHTML(e, size = 56, radius = 14) {
  // Upload utilisateur : on garde
  if (e.logoType === 'upload' && e.logoData) {
    return `<div class="carte-logo" style="width:${size}px;height:${size}px;border-radius:${radius}px;background:white;border:1.5px solid #eee;padding:4px"><img src="${e.logoData}" alt="${e.nom}" style="width:100%;height:100%;object-fit:contain;border-radius:${radius-2}px"></div>`;
  }
  // Initiale stylisée
  const lettre = (e.lettre || e.nom[0] || '?').toUpperCase();
  const bg = e.couleur || '#888';
  const tc = e.texteCouleur || '#fff';
  const fontSize = Math.round(size * 0.45);
  const fs = e.fontSize || 1.4;
  return `<div class="carte-logo" style="width:${size}px;height:${size}px;border-radius:${radius}px;background:${bg}"></div>`;
}

function creerCarteListe() {
  const div = document.createElement('div');
  div.className = 'carte carte-liste' + (carteOuverte === 'liste' ? ' ouverte' : '');
  div.id = 'carte-liste';
  const total = articles.length;

  div.innerHTML = `
    <div class="carte-header" onclick="toggleCarte('liste')">
      <div class="carte-logo" style="background:#2d2d44;color:white;font-size:1.5rem">📝</div>
      <div class="carte-nom">Ma liste de courses</div>
      ${total > 0 ? `<div class="badge">${total}</div>` : ''}
    </div>
    <div class="corps-liste" id="corps-liste">
      <div id="liste-articles">${renderArticles()}</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px">
        <input type="text" id="input-article" placeholder="Ajouter un article…" onkeydown="if(event.key==='Enter')ajouterArticle()" style="width:100%;border:2px solid #eee;border-radius:12px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:0.92rem;outline:none;">
        <div style="display:flex;gap:8px">
          <select id="select-enseigne" style="flex:1;border:2px solid #eee;border-radius:12px;padding:10px;font-family:'Nunito',sans-serif;font-size:0.85rem;outline:none;background:white;color:#444;">${optionsEnseignes()}</select>
          <button class="btn" onclick="ajouterArticle()" style="padding:10px 22px;font-size:1rem">Ajouter</button>
        </div>
      </div>
    </div>
  `;
  return div;
}

function optionsEnseignes() {
  return enseignes.map(e => `<option value="${e.id}">${e.nom}</option>`).join('');
}

function renderArticles() {
  if (articles.length === 0) return '<div class="vide">Aucun article pour l\'instant 😊</div>';
  return articles.map(a => {
    const e = enseignes.find(x => x.id === a.enseigneId);
    const bg = e ? e.couleur : '#eee';
    return `
      <div class="article-item" onclick="editerArticle('${a.id}')" style="cursor:pointer">

function importerLogo(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    // Redimensionner via canvas
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 200;
      const ratio = Math.min(max / img.width, max / img.height);
      canvas.width = Math.round(img.width * ratio);
      canvas.height = Math.round(img.height * ratio);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      editLogoData = canvas.toDataURL('image/png', 0.85);
      majApercuLogo();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ===================== DRAG ARTICLES MODAL =====================
let artDragSrcId = null;
let artDragEl = null;
let artDragClone = null;
let artDragStartY = 0;
let artLongPressTimer = null;
let artDragActive = false;
let artJustDragged = false;

function initArticleDrag() {
  // Rien à faire, les events sont inline sur les poignées
}

function artDragStart(e, id) {
  e.preventDefault();
  artDragSrcId = id;
  artDragEl = document.getElementById('ma-' + id);
  artDragStartY = e.clientY || (e.touches && e.touches[0].clientY) || 0;
  artDragActive = false;

  artLongPressTimer = setTimeout(() => {
    artDragActive = true;
    if (navigator.vibrate) navigator.vibrate(40);
    artDragEl.classList.add('dragging-art');

    // Clone visuel
    const rect = artDragEl.getBoundingClientRect();
    artDragClone = artDragEl.cloneNode(true);
    artDragClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;z-index:9999;pointer-events:none;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.2);background:white`;
    document.body.appendChild(artDragClone);
  }, 200);

  document.addEventListener('pointermove', artDragMove, {passive:false});
  document.addEventListener('pointerup', artDragEnd);
  document.addEventListener('pointercancel', artDragEnd);
}

function artDragMove(e) {
  if (!artDragActive) return;
  e.preventDefault();
  const y = e.clientY;

  // Annuler si on sort du modal
  const modal = document.querySelector('#modal-courses .modal');
  if (modal) {
    const mr = modal.getBoundingClientRect();
    if (e.clientX < mr.left || e.clientX > mr.right || y < mr.top || y > mr.bottom) {
      artDragEnd(e);
      return;
    }
  }

  if (artDragClone) {
    const rect = artDragEl.getBoundingClientRect();
    artDragClone.style.top = (y - rect.height/2) + 'px';
  }

  // Auto-scroll quand on approche des bords de la liste
  const liste = document.getElementById('modal-courses-liste');
  if (liste) {
    const lr = liste.getBoundingClientRect();
    const zone = 60;
    const speed = 8;
    if (y < lr.top + zone) liste.scrollTop -= speed;
    else if (y > lr.bottom - zone) liste.scrollTop += speed;
  }

  // Trouver l'élément cible
  document.querySelectorAll('.modal-article').forEach(el => el.classList.remove('drag-over-art'));
  if (artDragClone) artDragClone.style.display = 'none';
  const target = document.elementFromPoint(e.clientX, y);
  if (artDragClone) artDragClone.style.display = '';
  const targetEl = target && target.closest('.modal-article');
  if (targetEl && targetEl !== artDragEl) {
    targetEl.classList.add('drag-over-art');
  }
}

function artDragEnd(e) {
  clearTimeout(artLongPressTimer);
  document.removeEventListener('pointermove', artDragMove);
  document.removeEventListener('pointerup', artDragEnd);
  document.removeEventListener('pointercancel', artDragEnd);

  if (artDragClone) { artDragClone.remove(); artDragClone = null; }
  document.querySelectorAll('.modal-article').forEach(el => el.classList.remove('drag-over-art', 'dragging-art'));

  if (!artDragActive) { artDragActive = false; return; }
  artDragActive = false;

  const y = e.clientY;
  const targetEl = (() => {
    if (artDragClone) return null;
    const tmp = document.elementFromPoint(e.clientX, y);
    return tmp && tmp.closest('.modal-article');
  })();

  // Chercher la cible via position Y
  let best = null;
  document.querySelectorAll('.modal-article').forEach(el => {
    if (el === artDragEl) return;
    const r = el.getBoundingClientRect();
    if (y >= r.top && y <= r.bottom) best = el;
  });

  if (best) {
    const targetId = best.dataset.artId;
    const ensId = document.getElementById('modal-courses-titre').dataset.enseigneId;
    const ensArts = articles.filter(a => a.enseigneId === ensId);
    const otherArts = articles.filter(a => a.enseigneId !== ensId);
    const si = ensArts.findIndex(a => a.id === artDragSrcId);
    const ti = ensArts.findIndex(a => a.id === targetId);
    if (si !== -1 && ti !== -1 && si !== ti) {
      const [moved] = ensArts.splice(si, 1);
      ensArts.splice(ti, 0, moved);
      articles = [...otherArts, ...ensArts];
      sauvegarder();
      ouvrirCoursesEnseigne(ensId);
      // Scroller pour rendre visible l'article déplacé
      setTimeout(() => {
        const el = document.getElementById('ma-' + artDragSrcId);
        if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }, 50);
    }
  }
  if (artDragActive) { artJustDragged = true; setTimeout(() => { artJustDragged = false; }, 300); }
  artDragSrcId = null;
  artDragEl = null;
}

let swipeStartY = null;

document.addEventListener('DOMContentLoaded', () => {
  const modalCourses = document.getElementById('modal-courses');
  const modalInner = modalCourses.querySelector('.modal');

  // Swipe to close : uniquement si touch démarre sur le titre ou le handle
  modalInner.addEventListener('touchstart', e => {
    const titre = document.getElementById('modal-courses-titre');
    const handle = modalInner.querySelector('.modal-handle');
    const touchedZone = titre && titre.contains(e.target) || handle && handle.contains(e.target);
    swipeStartY = touchedZone ? e.touches[0].clientY : null;
  }, { passive: true });

  modalInner.addEventListener('touchmove', e => {
    if (swipeStartY === null) return;
    const dy = e.touches[0].clientY - swipeStartY;
    if (dy > 0) {
      e.preventDefault();
      modalInner.style.transform = `translateY(${dy}px)`;
      modalInner.style.transition = 'none';
    }
  }, { passive: false });

  modalInner.addEventListener('touchend', e => {
    if (swipeStartY === null) return;
    const dy = e.changedTouches[0].clientY - swipeStartY;
    modalInner.style.transition = 'transform 0.3s ease';
    if (dy > 60) {
      modalInner.style.transform = 'translateY(100%)';
      setTimeout(() => fermerModal('modal-courses'), 250);
    } else {
      modalInner.style.transform = '';
    }
    swipeStartY = null;
  });
});

// ===================== QR CODE HORS LIGNE =====================
// Algorithme QR Code minimal (version 1-10, mode byte, niveau L)
const QR = (() => {
  const GF = 256, PRIM = 0x11d;
  const gfExp = new Uint8Array(512), gfLog = new Uint8Array(256);
  let x = 1;
  for (let i = 0; i < 255; i++) {
    gfExp[i] = x; gfLog[x] = i;
    x <<= 1; if (x & 256) x ^= PRIM;
  }
  for (let i = 255; i < 512; i++) gfExp[i] = gfExp[i - 255];

  const mul = (a, b) => a && b ? gfExp[gfLog[a] + gfLog[b]] : 0;
  const polyMul = (p, q) => {
    const r = new Uint8Array(p.length + q.length - 1);
    for (let i = 0; i < p.length; i++)
      for (let j = 0; j < q.length; j++)
        r[i+j] ^= mul(p[i], q[j]);
    return r;
  };
  const polyDiv = (msg, gen) => {
    let r = new Uint8Array(msg);
    for (let i = 0; i < msg.length - gen.length + 1; i++) {
      const c = r[i];
      if (c) for (let j = 1; j < gen.length; j++) r[i+j] ^= mul(gen[j], c);
    }
    return r.slice(msg.length - gen.length + 1);
  };
  const rsGen = (nsym) => {
    let g = new Uint8Array([1]);
    for (let i = 0; i < nsym; i++) g = polyMul(g, new Uint8Array([1, gfExp[i]]));
    return g;
  };
  const rsEncode = (msg, nsym) => {
    const gen = rsGen(nsym);
    const ext = new Uint8Array(msg.length + nsym);
    ext.set(msg);
    return polyDiv(ext, gen);
  };

  // QR version info
  const VERSIONS = [
    null,
    {size:21,ec:{L:{blocks:1,data:19,ec:7}}},
    {size:25,ec:{L:{blocks:1,data:34,ec:10}}},
    {size:29,ec:{L:{blocks:1,data:55,ec:15}}},
    {size:33,ec:{L:{blocks:1,data:80,ec:20}}},
    {size:37,ec:{L:{blocks:1,data:108,ec:26}}},
    {size:41,ec:{L:{blocks:2,data:136,ec:18}}},
    {size:45,ec:{L:{blocks:2,data:156,ec:20}}},
    {size:49,ec:{L:{blocks:2,data:194,ec:24}}},
    {size:53,ec:{L:{blocks:2,data:232,ec:30}}},
    {size:57,ec:{L:{blocks:4,data:274,ec:18}}},
  ];

  const ALIGN = [null,[],[[6,18]],[[6,22]],[[6,26]],[[6,30]],[[6,34]],[[6,22,38]],[[6,24,42]],[[6,26,46]],[[6,28,50]]];

  function pickVersion(dataLen) {
    for (let v = 1; v <= 10; v++) {
      if (VERSIONS[v].ec.L.data >= dataLen + 4) return v;
    }
    throw new Error('Données trop longues');
  }

  function encode(text) {
    const bytes = [...text].map(c => c.charCodeAt(0) & 0xFF);
    const version = pickVersion(bytes.length);
    const info = VERSIONS[version].ec.L;
    const size = VERSIONS[version].size;

    // Bitstream
    const bits = [];
    const add = (val, n) => { for (let i = n-1; i >= 0; i--) bits.push((val >> i) & 1); };
    add(0b0100, 4); // mode byte
    add(bytes.length, 8);
    bytes.forEach(b => add(b, 8));
    add(0, 4); // terminator
    while (bits.length % 8) bits.push(0);
    const PADS = [0xEC, 0x11];
    let pi = 0;
    while (bits.length < info.data * 8) { add(PADS[pi], 8); pi = 1 - pi; }

    // Data bytes
    const data = [];
    for (let i = 0; i < bits.length; i += 8) {
      let b = 0;
      for (let j = 0; j < 8; j++) b = (b << 1) | (bits[i+j] || 0);
      data.push(b);
    }

    // EC per block
    const blockSize = Math.floor(info.data / info.blocks);
    const allData = [], allEc = [];
    for (let b = 0; b < info.blocks; b++) {
      const block = data.slice(b * blockSize, (b+1) * blockSize);
      allData.push(block);
      allEc.push([...rsEncode(new Uint8Array(block), info.ec)]);
    }
    const interleaved = [];
    for (let i = 0; i < allData[0].length; i++) allData.forEach(b => b[i] !== undefined && interleaved.push(b[i]));
    for (let i = 0; i < allEc[0].length; i++) allEc.forEach(b => b[i] !== undefined && interleaved.push(b[i]));

    // Final bitstream
    const finalBits = [];
    interleaved.forEach(b => { for (let i = 7; i >= 0; i--) finalBits.push((b >> i) & 1); });
    while (finalBits.length % 8) finalBits.push(0);

    // Build matrix
    const mat = Array.from({length: size}, () => new Array(size).fill(-1));
    const set = (r, c, v) => { if (r >= 0 && r < size && c >= 0 && c < size) mat[r][c] = v; };

    // Finder patterns
    const finder = (r, c) => {
      for (let i = -1; i <= 7; i++) for (let j = -1; j <= 7; j++) {
        const v = i < 0 || i > 6 || j < 0 || j > 6 ? 0 :
                  i === 0 || i === 6 || j === 0 || j === 6 ? 1 :
                  i >= 2 && i <= 4 && j >= 2 && j <= 4 ? 1 : 0;
        set(r+i, c+j, v);
      }
    };
    finder(0,0); finder(0,size-7); finder(size-7,0);

    // Timing
    for (let i = 8; i < size-8; i++) { set(6,i,i%2===0?1:0); set(i,6,i%2===0?1:0); }

    // Dark module
    set(4*version+9, 8, 1);

    // Alignment patterns
    if (ALIGN[version]) {
      ALIGN[version].forEach(pos => {
        pos.forEach(r => pos.forEach(c => {
          if (mat[r][c] === -1) {
            for (let i = -2; i <= 2; i++) for (let j = -2; j <= 2; j++) {
              set(r+i, c+j, (Math.abs(i)===2||Math.abs(j)===2||(!i&&!j))?1:0);
            }
          }
        }));
      });
    }

    // Format info (mask 0, L)
    const FORMAT = [0b111011111000100, 0b111001011110011, 0b111110110101010, 0b111100010011101,
                    0b110011000101111, 0b110001100011000, 0b110110001000001, 0b110100101110110];
    const fmt = FORMAT[0];
    const fmtBits = i => (fmt >> (14-i)) & 1;
    for (let i = 0; i < 6; i++) { set(8, i, fmtBits(i)); set(i, 8, fmtBits(i)); }
    set(8,7,fmtBits(6)); set(7,8,fmtBits(6));
    set(8,8,fmtBits(7)); set(8,size-8,fmtBits(8));
    for (let i = 0; i < 7; i++) { set(8,size-7+i,fmtBits(9+i)); set(size-7+i,8,fmtBits(9+i)); }

    // Data placement
    const reserved = (r,c) => mat[r][c] !== -1;
    let bit = 0;
    for (let col = size-1; col >= 0; col -= 2) {
      if (col === 6) col--;
      for (let row = 0; row < size; row++) {
        const r = (Math.floor(col/2) % 2 === 0) ? (size-1-row) : row;
        for (let dc = 0; dc <= 1; dc++) {
          const c = col - dc;
          if (!reserved(r,c)) {
            const b = finalBits[bit++] || 0;
            mat[r][c] = b ^ ((r+c) % 2 === 0 ? 1 : 0); // mask 0
          }
        }
      }
    }

    return mat;
  }

  return { encode };
})();

function dessinerQR(canvas, text) {
  let mat;
  try { mat = QR.encode(text); }
  catch(e) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.height = 200;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,200,200);
    ctx.fillStyle='#c00'; ctx.font='13px sans-serif'; ctx.textAlign='center';
    ctx.fillText('Texte trop long', 100, 100);
    return;
  }
  const s = mat.length;
  const cell = Math.floor(Math.min(window.innerWidth * 0.75, 300) / (s + 8));
  const quiet = cell * 4;
  canvas.width = canvas.height = s * cell + quiet * 2;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#000';
  for (let r = 0; r < s; r++)
    for (let c = 0; c < s; c++)
      if (mat[r][c]) ctx.fillRect(quiet + c*cell, quiet + r*cell, cell, cell);
}


// ---- Code-barres Code128 ----
function dessinerBarcode(canvas, text) {
  const encoded = encodeCode128(text);
  const barW = 2;
  const h = 120;
  const quiet = 20;
  canvas.width = encoded.length * barW + quiet * 2;
  canvas.height = h + 40;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#000';
  encoded.forEach((bit, i) => {
    if (bit === 1) ctx.fillRect(quiet + i * barW, 10, barW, h);
  });
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(text, canvas.width / 2, h + 28);
}

function encodeCode128(str) {
  // Table Code128B complète : 107 patterns
  const C = [
    [2,1,2,2,2,2],[2,2,2,1,2,2],[2,2,2,2,2,1],[1,2,1,2,2,3],[1,2,1,3,2,2],
    [1,3,1,2,2,2],[1,2,2,2,1,3],[1,2,2,3,1,2],[1,3,2,2,1,2],[2,2,1,2,1,3],
    [2,2,1,3,1,2],[2,3,1,2,1,2],[1,1,2,2,3,2],[1,2,2,1,3,2],[1,2,2,2,3,1],
    [1,1,3,2,2,2],[1,2,3,1,2,2],[1,2,3,2,2,1],[2,2,3,2,1,1],[2,2,1,1,3,2],
    [2,2,1,2,3,1],[2,1,3,2,1,2],[2,2,3,1,1,2],[3,1,2,1,3,1],[3,1,1,2,2,2],
    [3,2,1,1,2,2],[3,2,1,2,2,1],[3,1,2,2,1,2],[3,2,2,1,1,2],[3,2,2,2,1,1],
    [2,1,2,1,2,3],[2,1,2,3,2,1],[2,3,2,1,2,1],[1,1,1,3,2,3],[1,3,1,1,2,3],
    [1,3,1,3,2,1],[1,1,2,3,1,3],[1,3,2,1,1,3],[1,3,2,3,1,1],[2,1,1,3,1,3],
    [2,3,1,1,1,3],[2,3,1,3,1,1],[1,1,2,1,3,3],[1,1,2,3,3,1],[1,3,2,1,3,1],
    [1,1,3,1,2,3],[1,1,3,3,2,1],[1,3,3,1,2,1],[3,1,3,1,2,1],[2,1,1,3,3,1],
    [2,3,1,1,3,1],[2,1,3,1,1,3],[2,1,3,3,1,1],[2,1,3,1,3,1],[3,1,1,1,2,3],
    [3,1,1,3,2,1],[3,3,1,1,2,1],[3,1,2,1,1,3],[3,1,2,3,1,1],[3,3,2,1,1,1],
    [3,1,4,1,1,1],[2,2,1,4,1,1],[4,3,1,1,1,1],[1,1,1,2,2,4],[1,1,1,4,2,2],
    [1,2,1,1,2,4],[1,2,1,4,2,1],[1,4,1,1,2,2],[1,4,1,2,2,1],[1,1,2,2,1,4],
    [1,1,2,4,1,2],[1,2,2,1,1,4],[1,2,2,4,1,1],[1,4,2,1,1,2],[1,4,2,2,1,1],
    [2,4,1,2,1,1],[2,2,1,1,1,4],[4,1,3,1,1,1],[2,4,1,1,1,2],[1,3,4,1,1,1],
    [1,1,1,2,4,2],[1,2,1,1,4,2],[1,2,1,2,4,1],[1,1,4,2,1,2],[1,2,4,1,1,2],
    [1,2,4,2,1,1],[4,1,1,2,1,2],[4,2,1,1,1,2],[4,2,1,2,1,1],[2,1,2,1,4,1],
    [2,1,4,1,2,1],[4,1,2,1,2,1],[1,1,1,1,4,3],[1,1,1,3,4,1],[1,3,1,1,4,1],
    [1,1,4,1,1,3],[1,1,4,3,1,1],[4,1,1,1,1,3],[4,1,1,3,1,1],[1,1,3,1,4,1],
    [1,1,4,1,3,1],[3,1,1,1,4,1],[4,1,1,1,3,1],[2,1,1,4,1,2],[2,1,1,2,1,4],
    [2,1,1,2,3,2] // stop
  ];
  const START_B = 104;

  const toBits = (pat) => {
    const bits = [];
    pat.forEach((w, i) => { for (let j = 0; j < w; j++) bits.push(i % 2 === 0 ? 1 : 0); });
    return bits;
  };

  let bits = toBits(C[START_B]);
  let check = START_B;
  for (let i = 0; i < str.length; i++) {
    const v = str.charCodeAt(i) - 32;
    if (v < 0 || v > 95) continue;
    check += (i + 1) * v;
    bits = bits.concat(toBits(C[v]));
  }
  bits = bits.concat(toBits(C[check % 103]));
  // Pattern stop Code128 fixe
  bits = bits.concat(toBits([2,3,3,1,1,1,2]));
  bits.push(1, 1); // termination bar
  return bits;
}

// Touch drag — activé uniquement après un long press (~220ms)
let touchDragId = null, touchClone = null, touchLastOver = null;

let touchStartX = 0, touchStartY = 0;
const LONG_PRESS_DELAY = 220; // ms
const LONG_PRESS_MOVE_THRESHOLD = 8; // px — annule si on bouge trop vite

function onTouchStart(e) {

  touchStartX = t.clientX;
  touchStartY = t.clientY;

  longPressTimer = setTimeout(() => {

    const rect = carte.getBoundingClientRect();
    touchClone = carte.cloneNode(true);
    touchClone.style.cssText = `position:fixed;top:${rect.top}px;left:${rect.left}px;width:${rect.width}px;opacity:0.82;pointer-events:none;z-index:9999;border-radius:22px;box-shadow:0 12px 40px rgba(0,0,0,0.28);transition:none;transform:scale(1.05);`;
    document.body.appendChild(touchClone);
    carte.style.opacity = '0.35';
    // Vibration légère si supportée
    if (navigator.vibrate) navigator.vibrate(40);
  }, LONG_PRESS_DELAY);
}

function onTouchMove(e) {
  const t = e.touches[0];
  const dx = Math.abs(t.clientX - touchStartX);
  const dy = Math.abs(t.clientY - touchStartY);

  if (!touchDragActive) {
    // Annuler le long press si le doigt a trop bougé (scroll normal)
    if (dx > LONG_PRESS_MOVE_THRESHOLD || dy > LONG_PRESS_MOVE_THRESHOLD) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }
    return; // Laisser le scroll se faire normalement
  }

  // Drag actif : bloquer le scroll
  e.preventDefault();

  if (touchClone) {
    touchClone.style.left = (t.clientX - touchClone.offsetWidth / 2) + 'px';
    touchClone.style.top  = (t.clientY - touchClone.offsetHeight / 2) + 'px';
  }

  const el = document.elementFromPoint(t.clientX, t.clientY);
  const overCarte = el && el.closest('.carte-magasin');
  document.querySelectorAll('.carte-magasin').forEach(c => c.classList.remove('drag-over'));
  if (overCarte && overCarte.getAttribute('data-enseigne-id') !== touchDragId) {
    touchLastOver = overCarte.getAttribute('data-enseigne-id');
    overCarte.classList.add('drag-over');
  } else {
    touchLastOver = null;
  }
}

function onTouchEnd(e) {
  clearTimeout(longPressTimer);
  longPressTimer = null;

  if (longPressEl) longPressEl.style.opacity = '';
  if (touchClone) { touchClone.remove(); touchClone = null; }
  document.querySelectorAll('.carte-magasin').forEach(c => c.classList.remove('drag-over'));

  if (touchDragActive && touchDragId && touchLastOver && touchDragId !== touchLastOver) {
    const si = ordreMagasins.indexOf(touchDragId);
    const ti = ordreMagasins.indexOf(touchLastOver);
    if (si > -1 && ti > -1) {
      ordreMagasins.splice(si, 1);
      ordreMagasins.splice(ti, 0, touchDragId);
      sauvegarder();
      render();
    }
  }

  touchDragId = null;
  touchLastOver = null;
  touchDragActive = false;
  longPressEl = null;
}

function svgVersDataUrl(svgStr) {
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
}

const LOGO_GENERIQUE = "🏪";

function chercherLogo() {
  const nom = document.getElementById('edit-nom').value.trim().toLowerCase();
  const apercu = document.getElementById('logo-apercu');
  apercu.style.display = 'none';
  editLogoBase64 = null;

  if (!nom) {
    afficherApercuGenerique(apercu, 'Aucun nom saisi');
    return;
  }

  // Chercher dans les logos intégrés
  let logoTrouve = null;
  for (const [cle, val] of Object.entries(LOGOS_INTEGRES)) {
    if (nom.includes(cle)) { logoTrouve = val; break; }
  }

  if (logoTrouve) {
    const dataUrl = svgVersDataUrl(logoTrouve.svg);
    editLogoBase64 = dataUrl;
    editLogoOpt = 'image';
    apercu.innerHTML = `
      <div class="logo-apercu-wrap">
        <img class="logo-apercu-img" src="${dataUrl}" alt="logo" style="background:white;padding:2px">
        <div class="logo-apercu-txt">Logo trouvé !<span>${logoTrouve.nom}</span></div>
        <button class="btn-logo-suppr" onclick="supprimerLogoApercu()">✕ Retirer</button>
      </div>`;
    apercu.style.display = 'block';
  } else {
    afficherApercuGenerique(apercu, 'Enseigne non reconnue — logo générique utilisé');
  }
}

function afficherApercuGenerique(apercu, msg) {
  editLogoBase64 = 'generique';
  editLogoOpt = 'generique';
  apercu.innerHTML = `
    <div class="logo-apercu-wrap">
      <span style="font-size:2rem">${LOGO_GENERIQUE}</span>
      <div class="logo-apercu-txt">Logo générique<span>${msg}</span></div>
      <button class="btn-logo-suppr" onclick="supprimerLogoApercu()">✕ Retirer</button>
    </div>`;
  apercu.style.display = 'block';
}

function supprimerLogoApercu() {
  editLogoBase64 = null;
  editLogoOpt = 'lettre';
  document.getElementById('logo-apercu').style.display = 'none';
}


// ===================== INIT =====================
// Bloquer tout scroll horizontal natif
document.addEventListener('touchstart', function(e) {
  // Mémoriser la position X initiale
  window._touchStartX = e.touches[0].clientX;
  window._touchStartY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (touchDragActive) { e.preventDefault(); return; }
  const dx = Math.abs(e.touches[0].clientX - (window._touchStartX || 0));
  const dy = Math.abs(e.touches[0].clientY - (window._touchStartY || 0));
  // Si le mouvement est plus horizontal que vertical, bloquer
  if (dx > dy && dx > 5) {
    e.preventDefault();
  }
}, { passive: false });

render();
</script>
